<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta
    name="theme-color"
    content="#111111"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <title>STRIDE</title>

  <link
    rel="manifest"
    href="manifest.json"
  />

  <link
    rel="stylesheet"
    href="css/style.css"
  />

</head>

<body>

  <div class="app">

    <!-- HEADER -->

    <div class="header">

      <div class="brand-row">

        <div class="brand-mark">
          S
        </div>

        <div>

          <div class="brand-name">
            STRIDE
          </div>

          <div class="brand-sub">
            Track & Field Records
          </div>

        </div>

      </div>

    </div>

    <!-- HERO -->

    <div class="hero-card">

      <div class="hero-top">

        <div>

          <div class="hero-label">
            PERSONAL BEST
          </div>

          <div
            class="hero-event"
            id="heroEvent"
          >
            100m
          </div>

        </div>

        <div
          class="hero-wind"
          id="heroWind"
        >
          +0.0
        </div>

      </div>

      <div
        class="hero-time"
        id="pbTime"
      >
        --
      </div>

      <div
        class="hero-sub"
        id="pbMeet"
      >
        --
      </div>

    </div>

    <!-- EVENTS -->

    <div class="section">

      <div class="section-title">

        <h2>種目</h2>

      </div>

      <div
        class="filter-tabs"
        id="tabs"
      ></div>

    </div>

    <!-- RECORDS -->

    <div class="section">

      <div class="section-title">

        <h2>最近の記録</h2>

        <button
          class="view-all-btn"
          onclick="openAllRecords()"
        >
          すべて見る
        </button>

      </div>

      <div id="records"></div>

    </div>

  </div>

  <!-- FAB -->

  <button
    class="fab"
    onclick="openModal()"
  >
    +
  </button>

  <!-- ADD MODAL -->

  <div
    class="modal"
    id="modal"
  >

    <div class="modal-sheet">

      <div class="modal-header">

        <h2>記録追加</h2>

        <button
          class="close-btn"
          onclick="closeModal()"
        >
          ✕
        </button>

      </div>

      <div class="form-group">

        <label>日付</label>

        <input
          type="date"
          id="date"
        />

      </div>

      <div class="form-group">

        <label>大会名</label>

        <input
          type="text"
          id="meet"
          placeholder="熊本県高校総体"
        />

      </div>

      <div class="form-group">

        <label>種目</label>

        <select id="event">

          <option>100m</option>
          <option>200m</option>
          <option>400m</option>
          <option>60m</option>

        </select>

      </div>

      <div class="form-group">

        <label>タイム</label>

        <input
          type="number"
          step="0.01"
          id="time"
          placeholder="11.32"
        />

      </div>

      <div class="form-group">

        <label>風速</label>

        <input
          type="number"
          step="0.1"
          id="wind"
          placeholder="1.2"
        />

      </div>

      <button
        class="save-btn"
        id="saveBtn"
        onclick="saveRecord()"
      >
        保存
      </button>

    </div>

  </div>

  <!-- ALL RECORDS -->

  <div
    class="modal"
    id="allRecordsModal"
  >

    <div class="modal-sheet">

      <div class="modal-header">

        <h2>すべての記録</h2>

        <button
          class="close-btn"
          onclick="closeAllRecords()"
        >
          ✕
        </button>

      </div>

      <div id="allRecordsList"></div>

    </div>

  </div>

  <!-- BOTTOM NAV -->

  <div class="bottom-nav">

    <div class="nav-item active">
      <div>ホーム</div>
    </div>

    <div class="nav-item">
      <div>記録</div>
    </div>

    <div class="nav-item">
      <div>分析</div>
    </div>

    <div class="nav-item">
      <div>プロフィール</div>
    </div>

  </div>

  <script src="js/app.js"></script>

</body>

</html>
